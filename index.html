<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cregar Family</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f2ec;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .page {
    width: 100%;
    max-width: 720px;
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .scene {
    width: 100%;
    margin-bottom: 3rem;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .scene img {
    width: 100%;
    display: block;
  }
  .name {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #2c3e50;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .sub {
    font-size: 13px;
    letter-spacing: 0.22em;
    color: #8a9aaa;
    text-align: center;
    text-transform: uppercase;
  }
  .links {
    margin-top: 1.75rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
  }
  .links a {
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #7a9aaa;
    text-decoration: none;
    border-bottom: 1px solid #c8d8e0;
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .links a:hover {
    color: #2c3e50;
    border-color: #2c3e50;
  }
</style>
</head>
<body>
<div class="page">
  <div class="scene">
    <img src="family.png" alt="The Cregar Family illustration">
  </div>
  <p class="name">The Cregar Family</p>
  <p class="sub">cregar.net</p>
  <nav class="links">
    <a href="/packlists">Packing Lists</a>
  </nav>
</div>
</body>
</html>
