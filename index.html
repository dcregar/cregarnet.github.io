<!DOCTYPE html>
<html lang="en">
<head>

<title>The Cregar Family</title>
<style>

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f2ec;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .page {
    width: 100%;
    max-width: 720px;
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .scene {
    width: 100%;
    margin-bottom: 3rem;
  }
  .name {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #2c3e50;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .sub {
    font-size: 13px;
    letter-spacing: 0.22em;
    color: #8a9aaa;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
